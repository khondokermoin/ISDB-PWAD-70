<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pill Navbar + Owl Auto Carousel</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- Owl Carousel -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/owl.carousel@2.3.4/dist/assets/owl.carousel.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/owl.carousel@2.3.4/dist/assets/owl.theme.default.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");
      *,
      :before,
      :after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: rgba(255, 83, 83, 0.03);
        padding-top: 110px; /* fixed navbar gap */
      }

      /* wrapper */
      .nav-shell {
        width: 100%;
        max-width: 1500px;
        margin: 0 auto;
        padding: 0 24px;
      }

      /* Your navbar pill style */
      .nav-pill {
        width: 90%;
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        height: 50px;
        border-radius: 100px;
        display: flex;
        align-items: center;
        background: #fff;
        border: 1px solid hsla(0, 0%, 100%, 0.2);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        padding: 0 17px;
        z-index: 99;
      }
      @media screen and (min-width: 1024px) {
        .nav-pill {
          height: 63px;
          transition: background 0.3s;
        }
      }

      /* Menu */
      .menu-list[role="list"] {
        list-style: none;
        padding-left: 0;
        margin: 0;
      }
      .menu-list {
        display: flex;
        align-items: center;
        gap: 22px;
      }
      @media (min-width: 1024px) {
        .menu-list {
          flex: 1;
          justify-content: center;
        }
      }
      @media screen and (min-width: 1024px) {
        .navbar .menu-link {
          display: flex;
          align-items: center;
          text-decoration: none;
          font-size: 13px;
          font-weight: 600;
          color: #4e4b66;
          height: 100%;
          padding: 0 2px;
        }
      }
      .navbar .menu-link:hover {
        color: #2f2f3a;
      }
      .navbar .dropdown-toggle::after {
        display: none;
      }

      /* Right side */
      .search-and-lang {
        gap: 14px;
      }
      .search-form {
        position: relative;
        display: flex;
        align-items: center;
        height: 100%;
      }
      .search-input {
        height: 38px;
        border-radius: 999px;
        border: 1px solid #e6e7ec;
        padding: 0 44px 0 14px;
        outline: none;
        font-weight: 600;
        font-size: 14px;
        background: #fff;
      }
      .search-btn {
        position: absolute;
        right: 10px;
        border: 0;
        background: transparent;
        height: 38px;
        width: 34px;
        display: grid;
        place-items: center;
        cursor: pointer;
        color: #3f4259;
      }
      @media screen and (min-width: 1024px) {
        .navbar .search-and-lang .search-form {
          position: relative;
          flex: 1;
          display: flex;
          align-items: center;
          flex-direction: row-reverse;
          margin-right: 30.63px;
          height: 100%;
        }
        .navbar .search-and-lang .search-input {
          width: 260px;
        }
      }

      /* Language */
      .lang-wrap {
        background: #f3f4f7;
        border-radius: 999px;
        padding: 3px;
        display: inline-flex;
        gap: 6px;
      }
      .lang-btn {
        border: 0;
        border-radius: 999px;
        padding: 7px 14px;
        font-weight: 700;
        font-size: 12px;
        background: #e6e7ec;
        color: #3f4259;
      }
      .lang-btn.active {
        background: #d84b3e;
        color: #fff;
      }

      /* Mobile collapse */
      @media (max-width: 1023.98px) {
        .menu-list {
          gap: 8px;
          flex-direction: column;
          align-items: flex-start;
          padding: 10px 0;
        }
        .navbar .menu-link {
          width: 100%;
          padding: 10px 8px;
          font-weight: 600;
          color: #4e4b66;
        }
        .search-and-lang {
          width: 100%;
          flex-direction: column;
          align-items: flex-start !important;
          padding: 10px 0 0;
        }
        .search-input {
          width: 100%;
        }
      }

      /* ------------- Owl Cover Slider (like your CSS) ------------- */
      .cover-slider {
        width: 90%;
        margin: 18px auto 0;
      }

      /* like: .cover-slider .cover-slide .slide-image img { width:100% !important; } */
      .cover-slider .cover-slide .slide-image img {
        width: 100% !important;
        display: block;
        border-radius: 24px;
        height: 420px;
        object-fit: cover;
      }

      @media (max-width: 767.98px) {
        .cover-slider {
          width: 92%;
        }
        .cover-slider .cover-slide .slide-image img {
          height: 260px;
          border-radius: 18px;
        }
      }

      /* Hide nav buttons + dots (no click buttons) */
      .cover-slider .owl-nav,
      .cover-slider .owl-dots {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="topbar">
      <div class="nav-shell">
        <nav class="navbar navbar-expand-lg nav-pill">
          <div class="container-fluid px-0">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
              <img
                src="https://nagad.com.bd/_nuxt/img/new-logo.14fe8a5.png"
                alt="Logo"
                style="height: 40px"
              />
            </a>

            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNav"
              aria-controls="mainNav"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
              <ul class="navbar-nav menu-list" role="list">
                <li class="nav-item dropdown">
                  <a
                    class="menu-link dropdown-toggle"
                    href="#"
                    data-bs-toggle="dropdown"
                  >
                    Services <i class="bi bi-chevron-down ms-1"></i>
                  </a>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Service 1</a></li>
                    <li><a class="dropdown-item" href="#">Service 2</a></li>
                  </ul>
                </li>

                <li class="nav-item">
                  <a class="menu-link" href="#">Offers</a>
                </li>
                <li class="nav-item">
                  <a class="menu-link" href="#">About Us</a>
                </li>

                <li class="nav-item dropdown">
                  <a
                    class="menu-link dropdown-toggle"
                    href="#"
                    data-bs-toggle="dropdown"
                  >
                    Help <i class="bi bi-chevron-down ms-1"></i>
                  </a>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">FAQ</a></li>
                    <li><a class="dropdown-item" href="#">Support</a></li>
                  </ul>
                </li>

                <li class="nav-item dropdown">
                  <a
                    class="menu-link dropdown-toggle"
                    href="#"
                    data-bs-toggle="dropdown"
                  >
                    Career <i class="bi bi-chevron-down ms-1"></i>
                  </a>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Jobs</a></li>
                    <li><a class="dropdown-item" href="#">Internships</a></li>
                  </ul>
                </li>
              </ul>

              <div
                class="search-and-lang d-flex align-items-center ms-auto h-100"
              >
                <form class="search-form" action="#" method="get">
                  <button class="search-btn" type="submit" aria-label="Search">
                    <i class="bi bi-search"></i>
                  </button>
                  <input
                    class="search-input"
                    type="search"
                    name="q"
                    placeholder="Search"
                  />
                </form>

                <div class="lang-wrap">
                  <button class="lang-btn active" type="button">English</button>
                  <button class="lang-btn" type="button">বাংলা</button>
                </div>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <!-- COVER SLIDER (Owl Carousel, auto, no buttons) -->
    <section class="cover-slider">
      <div class="owl-carousel owl-theme" id="coverOwl">
        <div class="cover-slide">
          <div class="slide-image">
            <img
              src="https://backend.nagad.com.bd:8080/storage/uploads/slider/dQMITs22T37NMy1bwVRSw5kT0jT3NlAOXkQ0v8ww.jpg"
              alt="Slide 1"
            />
          </div>
        </div>

        <div class="cover-slide">
          <div class="slide-image">
            <img
              src="https://backend.nagad.com.bd:8080/storage/uploads/slider/EawvhPUHGQBKYXgW49kj9RPOvYV3X7LB50AdyQlO.jpg"
              alt="Slide 2"
            />
          </div>
        </div>

        <div class="cover-slide">
          <div class="slide-image">
            <img
              src="https://backend.nagad.com.bd:8080/storage/uploads/slider/qEnCmFYCPeZVcsEMVwy0gm8hLh6AkEvplrO5dmAK.jpg"
              alt="Slide 3"
            />
          </div>
        </div>
      </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery (required for Owl Carousel 2) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Owl Carousel -->
    <script src="https://cdn.jsdelivr.net/npm/owl.carousel@2.3.4/dist/owl.carousel.min.js"></script>

    <script>
      $("#coverOwl").owlCarousel({
        items: 1,
        loop: true,
        autoplay: true,
        autoplayTimeout: 3000, // 3 seconds
        autoplayHoverPause: false,
        smartSpeed: 700,
        nav: false, // no left/right buttons
        dots: false, // no dots
        touchDrag: true,
        mouseDrag: true,
      });
    </script>
  </body>
</html>

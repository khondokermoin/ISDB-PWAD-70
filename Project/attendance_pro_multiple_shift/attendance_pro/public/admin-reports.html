  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/public/assets/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="/public/admin.html">Admin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <div class="navbar-nav">
      <a class="nav-link" href="/public/admin-employees.html">Employees</a>
      <a class="nav-link" href="/public/admin-settings.html">Settings</a>
      <a class="nav-link active" href="/public/admin-reports.html">Reports</a>
    </div>
    </div>
    <div class="ms-auto">
      <button class="btn btn-outline-secondary btn-sm" onclick="openPwdModal()" class="btn btn-outline-primary btn-sm">Change password</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="d-flex flex-wrap gap-2 align-items-end mb-3">
        <div>
          <label class="form-label small">Month</label>
          <input type="month" class="form-control" id="month">
        </div>
        <button class="btn btn-primary" id="btnLoad">Load Summary</button>
        <a class="btn btn-outline-success" id="btnCsv" href="#" target="_blank">Export CSV</a>
      </div>

      <div class="alert alert-danger d-none" id="err"></div>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th>Emp</th><th>Name</th><th>Dept</th>
              <th>Present</th><th>Late</th><th>Absent</th><th>Leave</th><th>Incomplete</th><th>Total hours</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>


<!-- Change Password Modal -->
<div class="modal fade" id="pwdModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Change Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-danger d-none" id="pwdErr"></div>
        <div class="alert alert-success d-none" id="pwdOk"></div>
        <div class="mb-2">
          <label class="form-label small">Current password</label>
          <input type="password" class="form-control" id="pwdCurrent">
        </div>
        <div class="mb-2">
          <label class="form-label small">New password</label>
          <input type="password" class="form-control" id="pwdNew" placeholder="Minimum 6 chars">
        </div>
        <div>
          <label class="form-label small">Confirm new password</label>
          <input type="password" class="form-control" id="pwdConfirm">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="pwdSaveBtn">Save</button>
      </div>
    </div>
  </div>
</div>
<script>
  async function openPwdModal(){
    const m = new bootstrap.Modal(document.getElementById('pwdModal'));
    qs("#pwdErr").classList.add("d-none");
    qs("#pwdOk").classList.add("d-none");
    qs("#pwdCurrent").value = "";
    qs("#pwdNew").value = "";
    qs("#pwdConfirm").value = "";
    m.show();
  }

  (function(){
    const btn = document.getElementById("pwdSaveBtn");
    if(!btn) return;
    btn.addEventListener("click", async ()=>{
      const err = qs("#pwdErr"), ok = qs("#pwdOk");
      err.classList.add("d-none"); ok.classList.add("d-none");
      const current = qs("#pwdCurrent").value;
      const nw = qs("#pwdNew").value;
      const cf = qs("#pwdConfirm").value;
      if(!current || !nw) { err.textContent="Current and new password required"; err.classList.remove("d-none"); return; }
      if(nw.length < 6) { err.textContent="New password too short"; err.classList.remove("d-none"); return; }
      if(nw !== cf) { err.textContent="New password does not match"; err.classList.remove("d-none"); return; }
      try{
        await api("/auth/change_password", { method:"POST", body:{ current_password: current, new_password: nw }});
        ok.textContent="Password updated successfully"; ok.classList.remove("d-none");
      }catch(e){
        err.textContent=e.message; err.classList.remove("d-none");
      }
    });
  })();
</script>

<script src="/public/assets/app.js"></script>
<script>
  const err = qs("#err");
  function showErr(msg){ err.textContent = msg; err.classList.remove("d-none"); }

  async function loadSummary(){
    err.classList.add("d-none");
    const m = qs("#month").value;
    const r = await api(`/reports/summary?month=${encodeURIComponent(m)}`);
    const tbody = qs("#rows");
    tbody.innerHTML = "";
    r.rows.forEach(x => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${x.emp_code}</td>
        <td>${x.name}</td>
        <td>${x.department || "—"}</td>
        <td>${x.present_days}</td>
        <td>${x.late_days}</td>
        <td>${x.absent_days}</td>
        <td>${x.leave_days}</td>
        <td>${x.incomplete_days}</td>
        <td>${x.total_hours}</td>
      `;
      tbody.appendChild(tr);
    });

    qs("#btnCsv").href = `/api/reports/export?month=${encodeURIComponent(m)}&type=csv`;
  }

  (async function init(){
    await meOrRedirect("admin");
    const month = isoLocalMonth();
    qs("#month").value = month;
    qs("#btnLoad").addEventListener("click", ()=> loadSummary().catch(e=>showErr(e.message)));
    loadSummary().catch(e=>showErr(e.message));
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</footer>

  (function(){ const y = new Date().getFullYear(); const el = document.getElementById('yy'); if(el) el.textContent = y; })();

</body>

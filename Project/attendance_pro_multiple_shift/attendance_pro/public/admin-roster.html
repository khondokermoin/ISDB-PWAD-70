<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roster / Shift Assignment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/public/assets/style.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/public/admin.html">Attendance Pro</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="/public/admin.html">Dashboard</a>
        <a class="btn btn-outline-light btn-sm" href="/public/admin-employees.html">Employees</a>
        <a class="btn btn-outline-light btn-sm" href="/public/admin-settings.html">Settings</a>
        <a class="btn btn-outline-light btn-sm" href="/public/admin-reports.html">Reports</a>
        <button class="btn btn-warning btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header fw-bold">Employee Shift Assignment (Date Range)</div>
          <div class="card-body">
            <div class="alert alert-danger d-none" id="errBox"></div>
            <div class="alert alert-success d-none" id="okBox"></div>

            <div class="mb-3">
              <label class="form-label">Employee</label>
              <select class="form-select" id="employeeSelect"></select>
            </div>

            <div class="mb-3">
              <label class="form-label">Shift</label>
              <select class="form-select" id="shiftSelect"></select>
            </div>

            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label">From Date</label>
                <input type="date" class="form-control" id="fromDate">
              </div>
              <div class="col-md-6">
                <label class="form-label">To Date (optional)</label>
                <input type="date" class="form-control" id="toDate">
              </div>
            </div>

            <div class="mt-3 d-grid">
              <button class="btn btn-primary" id="assignBtn">Save Assignment</button>
            </div>

            <div class="mt-3 small text-muted">
              নোট: এক employee-এর জন্য overlapping date range allow নয়।
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header fw-bold d-flex align-items-center justify-content-between">
            <span>Assignments List</span>
            <div class="d-flex gap-2">
              <input type="month" class="form-control form-control-sm" id="monthFilter" style="max-width: 180px;">
              <button class="btn btn-outline-secondary btn-sm" id="refreshBtn">Refresh</button>
            </div>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-sm table-striped align-middle">
                <thead>
                  <tr>
                    <th>Employee</th>
                    <th>Shift</th>
                    <th>From</th>
                    <th>To</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
            </div>
            <div class="text-muted small">সর্বোচ্চ 500 items দেখাবে।</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/public/assets/app.js"></script>
  <script>
    const errBox = document.getElementById('errBox');
    const okBox = document.getElementById('okBox');

    function showErr(msg){
      okBox.classList.add('d-none');
      errBox.textContent = msg;
      errBox.classList.remove('d-none');
    }
    function showOk(msg){
      errBox.classList.add('d-none');
      okBox.textContent = msg;
      okBox.classList.remove('d-none');
      setTimeout(()=>okBox.classList.add('d-none'), 2500);
    }

    async function ensureAdmin(){
      const me = await api('/auth/me');
      if (!me.user || me.user.role !== 'admin') location.href='/public/index.html';
    }

    async function loadEmployees(){
      const r = await api('/employees');
      const sel = document.getElementById('employeeSelect');
      sel.innerHTML = r.items.map(e => `<option value="${e.id}">${e.emp_code} - ${e.name}</option>`).join('');
    }

    async function loadShifts(){
      const r = await api('/shifts');
      const sel = document.getElementById('shiftSelect');
      sel.innerHTML = r.items.map(s => `<option value="${s.id}">${s.name} (${s.start_time} - ${s.end_time})</option>`).join('');
    }

    async function loadRoster(){
      const month = document.getElementById('monthFilter').value;
      const qs = month ? `?month=${month}` : '';
      const r = await api('/roster' + qs);
      const tbody = document.getElementById('rows');
      tbody.innerHTML = '';
      for (const it of r.items){
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${it.emp_code} - ${it.employee_name}</td>
          <td>${it.shift_name} (${it.start_time} - ${it.end_time})</td>
          <td>${it.effective_from_date}</td>
          <td>${it.effective_to_date || ''}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-danger" data-id="${it.id}">Delete</button>
          </td>
        `;
        tr.querySelector('button').addEventListener('click', async ()=>{
          if (!confirm('Delete this assignment?')) return;
          await api('/roster/' + it.id, { method:'DELETE' });
          showOk('Deleted');
          loadRoster();
        });
        tbody.appendChild(tr);
      }
    }

    document.getElementById('assignBtn').addEventListener('click', async ()=>{
      try{
        const body = {
          employee_id: Number(document.getElementById('employeeSelect').value),
          shift_id: Number(document.getElementById('shiftSelect').value),
          effective_from_date: document.getElementById('fromDate').value,
          effective_to_date: document.getElementById('toDate').value || ''
        };
        const r = await api('/roster', { method:'POST', body });
        showOk('Assignment saved');
        loadRoster();
      }catch(e){
        showErr(e.message || String(e));
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', loadRoster);
    document.getElementById('logoutBtn').addEventListener('click', async ()=>{
      try{ await api('/auth/logout', { method:'POST' }); }catch(e){}
      localStorage.removeItem('csrf_token');
      location.href='/public/index.html';
    });

    (async function init(){
      await ensureAdmin();
      await loadEmployees();
      await loadShifts();
      // default month = current
      const d = new Date();
      document.getElementById('monthFilter').value = d.toISOString().slice(0,7);
      await loadRoster();
    })();
  </script>
</body>
</html>

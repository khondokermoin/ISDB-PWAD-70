<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khondoker Moin Hossain | Ultra Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
      :root {
        --bg: #000;
        --accent: #fff;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--accent);
        overflow-x: hidden;
        user-select: none;
      }

      /* 1. Film Grain Effect */
      .noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.05;
        pointer-events: none;
        z-index: 9999;
      }

      /* 2. Preloader */
      #preloader {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 3. Magnetic Button Style */
      .magnetic-wrap {
        display: inline-block;
        padding: 20px;
        transition: transform 0.3s ease-out;
      }

      /* Canvas for 3D */
      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }

      .reveal {
        opacity: 0;
        filter: blur(10px);
        transform: translateY(50px);
      }
      /* Custom Cursor */
      .cursor {
        width: 20px;
        height: 20px;
        border: 1px solid white;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 999;
        transition: transform 0.1s ease;
      }
    </style>
  </head>
  <body oncontextmenu="return false;" class="cursor hidden md:block">
    <div class="noise"></div>

    <div id="preloader">
      <h1 id="load-text" class="text-3xl font-bold tracking-tighter italic">
        KMH
      </h1>
    </div>

    <div id="canvas-container"></div>

    <nav
      class="fixed w-full z-50 flex justify-between items-center p-8 mix-blend-difference"
    >
      <div class="text-xl font-black uppercase">KMH.</div>
      <div class="magnetic-wrap">
        <a
          href="mailto:contact@moin.com"
          class="text-[10px] uppercase tracking-[0.4em] border border-white/20 px-6 py-3 rounded-full hover:bg-white hover:text-black transition"
          >Let's Talk</a
        >
      </div>
    </nav>

    <main id="main">
      <section class="h-screen flex flex-col justify-center px-10 md:px-24">
        <div class="reveal">
          <p class="text-[10px] uppercase tracking-[0.5em] text-zinc-500 mb-6">
            Digital Portfolio 2026
          </p>
          <h1
            class="text-[6vw] leading-[0.8] font-black tracking-tighter uppercase mb-6"
            style="font-family: 'Syne'"
          >
            Khondoker <br />
            <span class="italic text-zinc-800">Moin</span> <br />
            Hossain
          </h1>
          <p class="max-w-md text-zinc-400 font-light">
            ইমারসিভ ডিজিটাল এক্সপেরিয়েন্স এবং আধুনিক ওয়েব আর্কিটেকচারের কারিগর।
          </p>
        </div>
      </section>

      <section
        id="horizontal-wrap"
        class="h-screen overflow-hidden bg-white text-black"
      >
        <div
          id="horizontal-content"
          class="h-full flex items-center px-10 gap-20"
          style="width: 300vw"
        >
          <div class="w-[80vw] shrink-0">
            <h2
              class="text-[15vw] font-black leading-none tracking-tighter italic"
            >
              WORKS.
            </h2>
          </div>
          <div
            class="w-[60vw] h-[60vh] bg-zinc-200 rounded-3xl shrink-0 overflow-hidden relative group"
          >
            <div
              class="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-all"
            ></div>
            <img
              src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1000"
              class="w-full h-full object-cover"
            />
            <div
              class="absolute bottom-10 left-10 text-white font-bold text-3xl"
            >
              INTERFACE DESIGN
            </div>
          </div>
          <div
            class="w-[60vw] h-[60vh] bg-zinc-900 rounded-3xl shrink-0 overflow-hidden relative group"
          >
            <img
              src="https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?auto=format&fit=crop&q=80&w=1000"
              class="w-full h-full object-cover opacity-80"
            />
            <div
              class="absolute bottom-10 left-10 text-white font-bold text-3xl"
            >
              BRAND IDENTITY
            </div>
          </div>
        </div>
      </section>

      <section
        class="h-screen flex flex-col justify-center items-center text-center"
      >
        <h2 class="text-6xl md:text-9xl tracking-tighter italic mb-10 reveal">
          Available for <br />
          New Story.
        </h2>
        <div class="magnetic-wrap reveal">
          <a
            href="mailto:hello@moin.com"
            class="text-2xl md:text-4xl underline underline-offset-8 decoration-1 hover:text-zinc-500 transition"
            >Email Me.</a
          >
        </div>
      </section>
      <footer class="py-32 text-center relative z-10">
        <p class="text-zinc-600 mb-4 uppercase tracking-widest text-xs">
          Let's talk
        </p>
        <a
          href="mailto:contact@moin.com"
          class="text-4xl md:text-7xl font-bold hover:text-zinc-500 transition duration-500 underline decoration-1 underline-offset-8"
          >Get In Touch</a
        >
        <p class="mt-20 text-zinc-800 text-[10px] uppercase tracking-widest">
          © 2026 Khondoker Moin Hossain. All rights protected.
        </p>
      </footer>
    </main>

    <script>
      gsap.registerPlugin(ScrollTrigger);

      // 1. Lenis Smooth Scroll
      const lenis = new Lenis();
      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);

      // 2. Preloader Animation
      window.onload = () => {
        gsap.to('#load-text', { opacity: 0, duration: 0.5 });
        gsap.to('#preloader', {
          y: '-100%',
          duration: 1.2,
          ease: 'power4.inOut',
          delay: 0.5,
        });
        document.querySelectorAll('.reveal').forEach(el => {
          gsap.to(el, {
            opacity: 1,
            filter: 'blur(0px)',
            y: 0,
            duration: 1.5,
            delay: 1.2,
            ease: 'power4.out',
          });
        });
      };

      // 3. Three.js - 3D Particles Background
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      const renderer = new THREE.WebGLRenderer({ alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document
        .getElementById('canvas-container')
        .appendChild(renderer.domElement);

      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      for (let i = 0; i < 5000; i++) {
        vertices.push(
          THREE.MathUtils.randFloatSpread(2000),
          THREE.MathUtils.randFloatSpread(2000),
          THREE.MathUtils.randFloatSpread(2000)
        );
      }
      geometry.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(vertices, 3)
      );
      const particles = new THREE.Points(
        geometry,
        new THREE.PointsMaterial({ color: 0x444444, size: 2 })
      );
      scene.add(particles);
      camera.position.z = 1000;

      function animate() {
        requestAnimationFrame(animate);
        particles.rotation.x += 0.0005;
        particles.rotation.y += 0.0005;
        renderer.render(scene, camera);
      }
      animate();

      // 4. Horizontal Scroll logic
      gsap.to('#horizontal-content', {
        xPercent: -66.6,
        ease: 'none',
        scrollTrigger: {
          trigger: '#horizontal-wrap',
          pin: true,
          scrub: 1,
          end: () =>
            '+=' + document.querySelector('#horizontal-content').offsetWidth,
        },
      });

      // 5. Magnetic Button Interaction
      document.querySelectorAll('.magnetic-wrap').forEach(wrap => {
        wrap.addEventListener('mousemove', e => {
          const rect = wrap.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          gsap.to(wrap, {
            x: x * 0.5,
            y: y * 0.5,
            duration: 0.4,
            ease: 'power2.out',
          });
        });
        wrap.addEventListener('mouseleave', () => {
          gsap.to(wrap, {
            x: 0,
            y: 0,
            duration: 0.7,
            ease: 'elastic.out(1, 0.3)',
          });
        });
      });

      // 6. Security - Block Inspect
      document.onkeydown = function (e) {
        if (event.keyCode == 123) return false; // F12
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0))
          return false; // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0))
          return false; // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0))
          return false; // Ctrl+Shift+J
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
      };
    </script>
  </body>
</html>

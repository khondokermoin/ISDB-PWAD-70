    <style>
      body {
        background-color: #020617;
        color: #f8fafc;
        overflow-x: hidden;
        cursor: none; /* Custom cursor */
      }
      @media (pointer: coarse) {
        body {
          cursor: default;
        }
        .cursor,
        .cursor-dot {
          display: none !important;
        }
      }

      .glass-nav {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }
      .glass-card:hover {
        transform: translateY(-5px);
        border-color: #06b6d4;
        box-shadow: 0 10px 30px -10px rgba(6, 182, 212, 0.3);
      }
      .text-glow {
        text-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
      }

      /* Cursor blinking */
      .cursor {
        display: inline-block;
        width: 3px;
        height: 1.1em;
        vertical-align: -0.15em;
        background-color: #22d3ee;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Tailwind-missing helpers & bugfixes */
      .animation-delay-2000 { animation-delay: 2s; }
      .animation-delay-4000 { animation-delay: 4s; }
      .perspective-1000 { perspective: 1000px; }

      :focus-visible {
        outline: 2px solid rgba(34, 211, 238, 0.8);
        outline-offset: 3px;
        border-radius: 10px;
      }

      .rgb-divider {
        height: 2px;
        width: 100%;
        background: linear-gradient(90deg, #ff004c, #ff7a00, #ffe600, #00ff88, #00c2ff, #8b5cf6, #ff004c);
        background-size: 400% 100%;
        animation: rgbMove 6s linear infinite;
        box-shadow: 0 0 18px rgba(0, 194, 255, 0.35);
      }
      @keyframes rgbMove {
        0% { background-position: 0% 50%; }
        100% { background-position: 400% 50%; }
      }

      html { scroll-behavior: smooth; }
      section { scroll-margin-top: 96px; }

      .nav-link.active { color: #22d3ee !important; }

      /* Back to top button */
      .back-to-top-btn {
        position: fixed;
        right: 20px;
        bottom: 24px;
        z-index: 999;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 9999px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        color: rgba(226, 232, 240, 0.95);
        cursor: pointer;
        opacity: 0;
        transform: translateY(16px);
        pointer-events: none;
        transition: opacity 250ms ease, transform 250ms ease, border-color 250ms ease, background 250ms ease;
      }
      .back-to-top-btn.is-visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .back-to-top-btn:hover {
        border-color: rgba(34, 211, 238, 0.7);
        background: rgba(2, 6, 23, 0.88);
      }
      .back-to-top-btn:active { transform: translateY(1px); }

      /* Mobile adjustments */
      @media (max-width: 480px) {
        .back-to-top-btn { right: 14px; bottom: 18px; padding: 10px 12px; gap: 8px; }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto !important; }
        .cursor { animation: none !important; }
        .glass-card, .back-to-top-btn { transition: none !important; }
      }

      /* New premium effects */
      .noise {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.05;
        pointer-events: none;
        z-index: 9999;
      }

      #preloader {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .magnetic-wrap {
        display: inline-block;
        padding: 20px; /* Room for magnetic movement */
        transition: transform 0.3s ease-out;
      }

      #canvas-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
      }

      .reveal {
        opacity: 0;
        filter: blur(10px);
        transform: translateY(50px);
      }

      .cursor {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition: background 0.3s, transform 0.1s;
      }

      .cursor-dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 10000;
        transform: translate(-50%, -50%);
        mix-blend-mode: difference;
      }

      /* Existing custom fixes */
      #message { width: 100%; height: 160px; min-height: 160px; max-height: 160px; resize: none; box-sizing: border-box; }
      .type-line { height: 40px; min-height: 40px; overflow: hidden; white-space: nowrap; }
      .type-prefix { flex: 0 0 auto; }
      .typewriter {
        display: inline-block;
        width: 18ch;
        max-width: calc(100vw - 170px);
        overflow: hidden;
        white-space: nowrap;
        font-weight: 700;
        color: #f8fafc;
        border-right: 2px solid #22d3ee;
      }
      @media (max-width: 420px) { .typewriter { width: 14ch; max-width: calc(100vw - 155px); } }
      @media (max-width: 360px) { .typewriter { width: 12ch; max-width: calc(100vw - 145px); } }
      #about { min-height: 100vh; }

      @supports (height: 100dvh) { #about { min-height: 100dvh; } }

    <!-- Premium effects script -->
    <script>
      gsap.registerPlugin(ScrollTrigger);

      // Lenis smooth scroll
      const lenis = new Lenis();
      lenis.on('scroll', ScrollTrigger.update);
      gsap.ticker.add((time) => {
        lenis.raf(time * 1000);
      });
      gsap.ticker.lagSmoothing(0);

      ScrollTrigger.scrollerProxy('body', {
        scrollTop(value) {
          return arguments.length ? lenis.scrollTo(value, { immediate: true }) : lenis.scroll;
        },
        getBoundingClientRect() {
          return { top: 0, left: 0, width: window.innerWidth, height: window.innerHeight };
        },
        pinType: document.body.style.transform ? "transform" : "fixed"
      });
      ScrollTrigger.refresh();

      // Preloader + reveal animation
      window.addEventListener('load', () => {
        gsap.to('#load-text', { opacity: 0, duration: 0.5 });
        gsap.to('#preloader', {
          y: '-100%',
          duration: 1.2,
          ease: 'power4.inOut',
          delay: 0.5,
        });

        document.querySelectorAll('.reveal').forEach((el, i) => {
          gsap.to(el, {
            opacity: 1,
            filter: 'blur(0px)',
            y: 0,
            duration: 1.2,
            delay: 1 + i * 0.1,
            ease: 'power4.out',
          });
        });
      });

      // Three.js particles background (cyan to match theme)
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      for (let i = 0; i < 8000; i++) {
        vertices.push(
          THREE.MathUtils.randFloatSpread(2000),
          THREE.MathUtils.randFloatSpread(2000),
          THREE.MathUtils.randFloatSpread(2000)
        );
      }
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

      const material = new THREE.PointsMaterial({
        color: 0x22d3ee,
        size: 3,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
      });
      const particles = new THREE.Points(geometry, material);
      scene.add(particles);
      camera.position.z = 1000;

      function animate() {
        requestAnimationFrame(animate);
        particles.rotation.x += 0.0003;
        particles.rotation.y += 0.0005;
        renderer.render(scene, camera);
      }
      animate();

      // Resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        ScrollTrigger.refresh();
      });

      // Magnetic buttons
      document.querySelectorAll('.magnetic-wrap').forEach(wrap => {
        wrap.addEventListener('mousemove', (e) => {
          const rect = wrap.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          gsap.to(wrap, { x: x * 0.5, y: y * 0.5, duration: 0.6, ease: 'power3.out' });
        });
        wrap.addEventListener('mouseleave', () => {
          gsap.to(wrap, { x: 0, y: 0, duration: 0.8, ease: 'elastic.out(1, 0.3)' });
        });
      });

      // Custom cursor
      const cursorOuter = document.querySelector('.cursor');
      const cursorInner = document.querySelector('.cursor-dot');
      let mouseX = 0, mouseY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;

        gsap.to(cursorInner, { x: mouseX, y: mouseY, duration: 0.15, ease: 'power2.out' });
        gsap.to(cursorOuter, { x: mouseX, y: mouseY, duration: 0.7, ease: 'power3.out' });
      });

      // Cursor scale on interactive elements
      document.querySelectorAll('a, button, .magnetic-wrap').forEach(el => {
        el.addEventListener('mouseenter', () => {
          gsap.to(cursorOuter, { scale: 2.2, duration: 0.4, ease: 'power2.out' });
          gsap.to(cursorInner, { scale: 0, duration: 0.4 });
        });
        el.addEventListener('mouseleave', () => {
          gsap.to(cursorOuter, { scale: 1, duration: 0.4 });
          gsap.to(cursorInner, { scale: 1, duration: 0.4 });
        });
      });

      // Block dev tools (optional – remove if unwanted)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) {
          e.preventDefault();
          return false;
        }
      });
    </script>

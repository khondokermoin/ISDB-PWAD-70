<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khondoker Moin Hossain | Ultra Modern</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: #000;
        color: #fff;
        overflow-x: hidden;
      }

      .noise {
        position: fixed;
        inset: 0;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.05;
        pointer-events: none;
        z-index: 9999;
      }

      #preloader {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: -1;
      }

      .reveal {
        opacity: 0;
        transform: translateY(60px);
        filter: blur(10px);
      }

      /* Cursor */
      .cursor {
        width: 18px;
        height: 18px;
        border: 1px solid white;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 999;
        transform: translate(-50%, -50%);
        mix-blend-mode: difference;
      }

      @media (max-width: 768px) {
        .cursor {
          display: none;
        }
      }
    </style>
  </head>

  <body oncontextmenu="return false;">
    <div class="noise"></div>
    <div class="cursor" id="cursor"></div>

    <div id="preloader">
      <h1 class="text-4xl font-black italic">KMH</h1>
    </div>

    <div id="canvas-container"></div>

    <!-- NAV -->
    <nav
      class="fixed w-full z-50 flex justify-between p-8 mix-blend-difference"
    >
      <div class="font-black uppercase">KMH.</div>
      <a
        href="mailto:contact@moin.com"
        class="magnetic uppercase text-xs tracking-widest border px-6 py-3 rounded-full"
        >Let’s Talk</a
      >
    </nav>

    <!-- HERO -->
    <section class="h-screen flex items-center px-10 md:px-24">
      <div>
        <p class="text-xs tracking-[0.5em] text-zinc-500 mb-6 reveal">
          Digital Portfolio 2026
        </p>
        <h1
          class="text-[6vw] font-black leading-[0.85] uppercase mb-6 reveal"
          style="font-family: Syne"
        >
          Khondoker <br /><span class="italic text-zinc-800">Moin</span
          ><br />Hossain
        </h1>
        <p class="max-w-md text-zinc-400 reveal">
          ইমারসিভ ডিজিটাল এক্সপেরিয়েন্স এবং আধুনিক ওয়েব আর্কিটেকচারের কারিগর।
        </p>
      </div>
    </section>

    <!-- HORIZONTAL -->
    <section
      id="horizontal-wrap"
      class="h-screen bg-white text-black overflow-hidden"
    >
      <div
        id="horizontal-content"
        class="flex items-center h-full gap-32 px-20"
        style="width: 300vw"
      >
        <h2 class="text-[15vw] font-black italic">WORKS.</h2>
        <div class="w-[60vw] h-[60vh] bg-zinc-300 rounded-3xl"></div>
        <div class="w-[60vw] h-[60vh] bg-zinc-800 rounded-3xl"></div>
      </div>
    </section>

    <!-- CTA -->
    <section
      class="h-screen flex flex-col justify-center items-center text-center"
    >
      <h2 class="text-7xl md:text-9xl italic mb-10 reveal">
        Available for<br />New Story.
      </h2>
      <a href="mailto:hello@moin.com" class="text-4xl underline reveal"
        >Email Me</a
      >
    </section>

    <script>
      /* ---------- UTIL ---------- */
      const isMobile = window.innerWidth < 768;

      /* ---------- GSAP ---------- */
      gsap.registerPlugin(ScrollTrigger);

      /* ---------- LENIS ---------- */
      let lenis;
      if (!isMobile) {
        lenis = new Lenis({ smooth: true });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add(t => lenis.raf(t * 1000));
        gsap.ticker.lagSmoothing(0);
      }

      /* ---------- PRELOADER + HERO ---------- */
      window.onload = () => {
        const tl = gsap.timeline();
        tl.to('#preloader', {
          y: '-100%',
          duration: 1.2,
          ease: 'power4.inOut',
        }).to(
          '.reveal',
          {
            opacity: 1,
            y: 0,
            filter: 'blur(0)',
            stagger: 0.15,
            duration: 1.2,
            ease: 'power4.out',
          },
          '-=0.6'
        );
      };

      /* ---------- THREE JS (LIGHT MOBILE) ---------- */
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        innerWidth / innerHeight,
        0.1,
        2000
      );
      camera.position.z = 1000;

      const renderer = new THREE.WebGLRenderer({ alpha: true });
      renderer.setSize(innerWidth, innerHeight);
      document
        .getElementById('canvas-container')
        .appendChild(renderer.domElement);

      const count = isMobile ? 1500 : 5000;
      const geometry = new THREE.BufferGeometry();
      const vertices = [];

      for (let i = 0; i < count; i++) {
        vertices.push(
          THREE.MathUtils.randFloatSpread(2000),
          THREE.MathUtils.randFloatSpread(2000),
          THREE.MathUtils.randFloatSpread(2000)
        );
      }
      geometry.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(vertices, 3)
      );

      const particles = new THREE.Points(
        geometry,
        new THREE.PointsMaterial({ color: 0x444444, size: 2 })
      );
      scene.add(particles);

      function animate() {
        requestAnimationFrame(animate);
        particles.rotation.y += 0.0005;
        renderer.render(scene, camera);
      }
      animate();

      /* ---------- HORIZONTAL ---------- */
      gsap.to('#horizontal-content', {
        xPercent: -66.6,
        ease: 'none',
        scrollTrigger: {
          trigger: '#horizontal-wrap',
          pin: true,
          scrub: 1,
          end: () =>
            '+=' +
            (document.querySelector('#horizontal-content').scrollWidth -
              innerWidth),
        },
      });

      /* ---------- CURSOR ---------- */
      const cursor = document.getElementById('cursor');
      window.addEventListener('mousemove', e => {
        gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.15 });
      });

      /* ---------- MAGNETIC ---------- */
      document.querySelectorAll('.magnetic').forEach(el => {
        el.addEventListener('mousemove', e => {
          const r = el.getBoundingClientRect();
          gsap.to(el, {
            x: (e.clientX - r.left - r.width / 2) * 0.4,
            y: (e.clientY - r.top - r.height / 2) * 0.4,
            duration: 0.3,
          });
        });
        el.addEventListener('mouseleave', () => {
          gsap.to(el, { x: 0, y: 0, duration: 0.6 });
        });
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // and operator
      let sheSayYes = true;
      let familyAgrees = true;

      if (sheSayYes && familyAgrees) {
        console.log('Wedding fixed 💍');
      }

      // or operator
      let sheSaysYes = false;
      let youAreRich = true;

      if (sheSaysYes || youAreRich) {
        console.log('Still chance bro 😉');
      }

      // ‍array
      var st_70 = ['rasel'];
      console.log(st_70);
      st_70.push('tahim'); // when array তে শেষে কিছু add করবো তখন push use করতে হয়
      console.log(st_70);
      st_70.unshift('moin'); // when array এর শুরু তে কিছু add করবো তখন unshift use করতে হয়
      console.log(st_70);
      st_70.pop(); // last থেকে রিমুভ করতে pop use করতে হয়
      console.log(st_70);
      st_70.shift(); // first থেকে রিমুভ করতে shift use করতে হয়
      console.log(st_70);
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // use function IIFE
      (function (a, b) {
        console.log(a + b);
      })(10, 20);

      // use arro IIFE
      ((a, b) => {
        console.log(a + b);
      })(10, 20);
    </script>
  </body>
</html>

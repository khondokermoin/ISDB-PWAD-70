<!doctype html>
<html>
  <head>
    <title>Prime Step-by-Step Checker</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      input,
      button {
        padding: 5px 10px;
        margin: 5px;
      }
      .step {
        margin: 3px 0;
      }
      .prime {
        color: green;
        font-weight: bold;
      }
      .not-prime {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Prime Number Checker (Step by Step)</h2>

    <input type="number" id="numberInput" placeholder="Enter a number" />
    <button onclick="checkPrime()">Check</button>

    <div id="steps"></div>
    <p id="result"></p>

    <!-- Meadum -->
    <script>
      function checkPrime() {
        let num = parseInt(document.getElementById('numberInput').value);
        let result = document.getElementById('result');

        if (num <= 1) {
          result.innerText = 'Not Prime';
          return;
        }

        for (let i = 2; i <= Math.sqrt(num); i++) {
          if (num % i === 0) {
            result.innerText = 'Not Prime';
            return;
          }
        }

        result.innerText = 'Prime Number ✅';
      }
    </script>

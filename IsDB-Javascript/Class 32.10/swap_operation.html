<!doctype html>
<html>
  <head>
    <title>Sort 3 Numbers</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      input {
        width: 50px;
        padding: 5px;
        margin: 5px;
      }
      button {
        padding: 5px 10px;
      }
      #result {
        margin-top: 15px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Sort 3 Numbers (Smallest → Largest)</h2>

    <input type="number" id="num1" placeholder="a" />
    <input type="number" id="num2" placeholder="b" />
    <input type="number" id="num3" placeholder="c" />
    <button onclick="sortNumbers()">Sort</button>

    <p id="result"></p>

    <script>
      function sortNumbers() {
        // Get input values
        let a = parseInt(document.getElementById('num1').value);
        let b = parseInt(document.getElementById('num2').value);
        let c = parseInt(document.getElementById('num3').value);

        // Put numbers in an array
        let numbers = [a, b, c];

        // Sort the array in ascending order
        numbers.sort((x, y) => x - y);

        // Display result
        document.getElementById('result').innerText =
          `Sorted order: ${numbers[0]} < ${numbers[1]} < ${numbers[2]}`;
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var char = prompt('Enter a single character').toLowerCase();

      switch (char) {
        case 'a':
        case 'e':
        case 'i':
        case 'o':
        case 'u':
          console.log(char + ' is a vowel');
          break;
        default:
          console.log(char + ' is not a vowel');
      }
    </script>
  </body>
</html>

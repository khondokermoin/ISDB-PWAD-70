<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // User input
      var a = Number(prompt('Enter first number:'));
      var b = Number(prompt('Enter second number:'));
      var c = Number(prompt('Enter third number:'));

      // Variable to hold sorted numbers
      var first, second, third;

      // Compare numbers and sort manually
      if (a >= b && a >= c) {
        first = a;
        if (b >= c) {
          second = b;
          third = c;
        } else {
          second = c;
          third = b;
        }
      } else if (b >= a && b >= c) {
        first = b;
        if (a >= c) {
          second = a;
          third = c;
        } else {
          second = c;
          third = a;
        }
      } else {
        first = c;
        if (a >= b) {
          second = a;
          third = b;
        } else {
          second = b;
          third = a;
        }
      }

      // Print descending order
      document.write(
        'Descending order: ' + first + ', ' + second + ', ' + third
      );
    </script>
  </body>
</html>

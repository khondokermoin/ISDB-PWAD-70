<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      for (let i = 1; i <= 5; i++) {
        // ১ থেকে ৫ পর্যন্ত
        let star = ''; // খালি string
        for (let j = 1; j <= i; j++) {
          // i পর্যন্ত *
          star += '*'; // * যোগ করছি
        }
        console.log(star); // প্রিন্ট
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>
  </head>
  <body>
    <script>
      function factorial(n) {
        let result = 1; // শুরুতে 1

        for (let i = 1; i <= n; i++) {
          result *= i; // result = result * i
        }

        return result;
      }

      console.log(factorial(5)); // 120
    </script>
  </body>
</html>

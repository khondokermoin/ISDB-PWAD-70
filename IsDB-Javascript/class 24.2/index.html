<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // number type
      let a = 20;
      let b = 20;
      let sum = a + b;
      console.log(typeof sum);

      // string type
      let first_name = 'Rakib';
      let last_name = 'Rakib';
      let fulll_name = first_name + '' + last_name;
      console.log(typeof fulll_name);

      // boolean = true / flase
      let p = 5;
      let q = 7;
      let r = p < q;
      console.log(typeof r);

      // object literal
      let car = {
        model: 100,
        color: 'black',
        Name: 'Toyota',
      };
      console.log(car);
      console.log(typeof car);
      console.log(car.model + '\n' + car.color + '\n' + car.Name);
      document.write(car.model + '<br>' + car.color + '<br>' + car.Name);

      //
    </script>
  </body>
</html>

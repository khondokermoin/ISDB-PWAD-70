<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe</title>
  </head>
  <body>
    <!-- CONTAINER -->
    <div style="width: 100%; height: 500px; overflow: hidden; background: #ddd">
      <!-- LEFT CHILD -->
      <div
        style="
          width: 25%;
          height: 100%;
          float: left;
          padding: 20px;
          box-sizing: border-box;
          background: #1f2937;
        "
      >
        <a
          href="./table.html"
          target="iframe"
          style="
            display: block;
            padding: 12px;
            margin-bottom: 12px;
            text-align: center;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
          "
          >Table</a
        >

        <a
          href="./form.html"
          target="iframe"
          style="
            display: block;
            padding: 12px;
            text-align: center;
            background: #10b981;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
          "
          >Form</a
        >
      </div>

      <!-- RIGHT CHILD -->
      <div
        style="
          width: 75%;
          height: 100%;
          float: left;
          text-align: center;
          background: #e5e7eb;
        "
      >
        <iframe
          name="iframe"
          src="./table.html"
          frameborder="0"
          style="width: 95%; height: 100%; border: none"
        ></iframe>
      </div>
    </div>
  </body>
</html>

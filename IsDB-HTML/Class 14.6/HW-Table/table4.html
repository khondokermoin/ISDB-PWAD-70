<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table 4</title>
  </head>
  <body>
    <h3 style="text-align: center">Invoice</h3>

    <table border="1" cellspacing="0" cellpadding="10" width="100%">
      <tr>
        <th align="left">Item / Desc.</th>
        <th align="left">Qty.</th>
        <th>@</th>
        <th align="left">Price</th>
      </tr>

      <tr>
        <td align="left">Paperclips (Box)</td>
        <td>100</td>
        <td>1.15</td>
        <td>115.00</td>
      </tr>

      <tr>
        <td align="left">Paper (Case)</td>
        <td>10</td>
        <td>45.99</td>
        <td>459.90</td>
      </tr>

      <tr>
        <td align="left">Wastepaper<br />Baskets</td>
        <td>2</td>
        <td>17.99</td>
        <td>35.98</td>
      </tr>

      <tr>
        <td colspan="3" align="left"><b>Subtotal</b></td>
        <td>610.88</td>
      </tr>

      <tr>
        <td colspan="2" align="left"><b>Tax</b></td>
        <td>7%</td>
        <td>42.76</td>
      </tr>

      <tr>
        <td colspan="3" align="left"><b>Total</b></td>
        <td>653.64</td>
      </tr>
    </table>
  </body>
</html>

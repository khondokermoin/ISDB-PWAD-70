<!doctype html>
<html>
  <head>
    <title>Table 7</title>
    <style>
      td {
        text-align: center;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <h1>HTML Table</h1>

    <table border="1" cellpadding="8" width="50%">
      <tr>
        <td colspan="2">Cell 1</td>
        <td>Cell 2</td>
        <td>Cell 3</td>
      </tr>
      <tr>
        <td rowspan="3">Cell 4</td>
        <td>Cell 5</td>
        <td>Cell 6</td>
        <td>Cell 7</td>
      </tr>
      <tr>
        <td colspan="3">Cell 8</td>
      </tr>
      <tr>
        <td>Cell 9</td>
        <td colspan="2">Cell 10</td>
      </tr>
    </table>
  </body>
</html>

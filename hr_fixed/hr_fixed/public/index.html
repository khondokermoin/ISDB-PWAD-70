<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/public/assets/style.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

  <!-- MAIN (centered) -->
  <main class="flex-grow-1 d-flex align-items-center">
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h4 class="mb-1">Attendance System</h4>
              <div class="text-muted mb-3">Admin/Employee login</div>

              <div class="alert alert-danger d-none" id="err"></div>

              <div class="mb-3">
                <label class="form-label">Username / Email / Phone</label>
                <input class="form-control" id="username" placeholder="admin / E001 / 01xxxxxxxxx" autocomplete="username" />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password" />
              </div>

              <button class="btn btn-primary w-100" id="btn" type="button">Login</button>

              <div class="small text-muted mt-3">
                Admin credentials are private. Please contact HR/Admin if you need access.
              </div>
            </div>
          </div>

          <div class="text-center text-muted small mt-3">© Western Watch BD</div>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="border-top bg-white">
    <div class="container py-3 d-flex flex-wrap justify-content-between align-items-center gap-2">
      <div class="text-muted small">© <span id="yy"></span> Western Watch BD • HR Attendance</div>
      <div class="text-muted small">Support: admin@yourcompany.com</div>
    </div>
  </footer>

  <script src="/public/assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // footer year
    (function(){
      const y = new Date().getFullYear();
      const el = document.getElementById('yy');
      if(el) el.textContent = y;
    })();

    const err = qs("#err");

    async function doLogin() {
      err.classList.add("d-none");
      try {
        const r = await api("/auth/login", {
          method: "POST",
          body: {
            username: qs("#username").value.trim(),
            password: qs("#password").value
          }
        });
        if (r.user.role === "admin") location.href = "/public/admin.html";
        else location.href = "/public/employee.html";
      } catch (e) {
        err.textContent = e.message;
        err.classList.remove("d-none");
      }
    }

    // Click -> login
    qs("#btn").addEventListener("click", doLogin);

    // Enter -> login
    ["#username", "#password"].forEach(sel => {
      qs(sel).addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          doLogin();
        }
      });
    });
  </script>
</body>
</html>

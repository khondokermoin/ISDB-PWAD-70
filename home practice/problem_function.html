      const input = prompt("Enter your words...") ?? "";

      function viol(str) {
        const vowels = "aeiou";
        let count = 0;

        for (const char of str.toLowerCase()) {
          if (vowels.includes(char)) {
            count++;
          }
        }

        return count;
      }

      document.write(viol(input));

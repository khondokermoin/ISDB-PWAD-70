<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Bootstrap Image Gallery</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .gallery img {
        width: 100%;
        height: 100%;
        object-fit: contain; /* full image visible, no cropping */
        display: block;
        background: #000; /* dark letterbox bars if needed */
        border-radius: 12px; /* rounded corners */
        transition: transform 0.3s ease;
      }
      .gallery .col {
        padding: 10px; /* larger gap between images */
      }
      .gallery .row {
        margin: 0 -10px; /* compensate padding */
      }
      .gallery .row + .row {
        margin-top: 20px; /* vertical gap between rows */
      }
      .gallery .col:hover img {
        transform: scale(1.08); /* subtle zoom on hover */
      }
    </style>
  </head>
  <body class="bg-dark">
    <div class="container my-5">
      <h2 class="text-white text-center mb-4">Image Gallery</h2>

      <!-- Gallery -->
      <div class="gallery">
        <!-- Row 1 -->
        <div class="row">
          <div class="col-6 col-md-4 col-lg-3">
            <img
              src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4"
              alt="Mountain"
            />
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <img
              src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
              alt="Beach"
            />
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <img
              src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
              alt="Forest"
            />
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <img
              src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4"
              alt="Mountain 2"
            />
          </div>
        </div>

        <!-- Row 2 -->
        <div class="row">
          <div class="col-6 col-md-3 col-lg-2">
            <img
              src="https://bengali.cdn.zeenews.com/bengali/sites/default/files/2025/07/23/555341-tanusree-dutta.jpg?im=Resize=(966,509)"
              alt="Desert"
            />
          </div>
          <div class="col-6 col-md-3 col-lg-2">
            <img
              src="https://cdn.jugantor.com/assets/news_photos/2023/08/21/image-709242-1692608541.jpg"
              alt="Grass"
            />
          </div>
          <div class="col-6 col-md-3 col-lg-2">
            <img
              src="https://www.iwmbuzz.com/wp-content/uploads/2024/10/mimi-chakraborty-stuns-in-maroon-lehenga-exuding-bridal-elegance-3.jpg"
              alt="Flower field"
            />
          </div>
          <div class="col-6 col-md-3 col-lg-2">
            <img
              src="https://www.nihaofficial.com/wp-content/uploads/2024/09/Niha-4.jpeg"
              alt="Hiker"
            />
          </div>
          <div class="col-6 col-md-3 col-lg-2">
            <img
              src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05"
              alt="Nature"
            />
          </div>
          <div class="col-6 col-md-3 col-lg-2">
            <img
              src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e"
              alt="Grass 2"
            />
          </div>
        </div>

        <!-- Row 3 -->
        <div class="row">
          <div class="col-4 col-md-3">
            <img
              src="https://images.pexels.com/photos/33752145/pexels-photo-33752145.jpeg?_gl=1*xruis8*_ga*ODY1Mjc4NzQzLjE3NzAwMDM2NDU.*_ga_8JE65Q40S6*czE3NzAwMDM2NDQkbzEkZzEkdDE3NzAwMDM2ODgkajE2JGwwJGgw"
              alt="Waterfall"
            />
          </div>
          <div class="col-4 col-md-3">
            <img
              src="https://images.unsplash.com/photo-1519681393784-d120267933ba"
              alt="Milky way"
            />
          </div>
          <div class="col-4 col-md-3">
            <img
              src="https://images.pexels.com/photos/33752145/pexels-photo-33752145.jpeg?_gl=1*xruis8*_ga*ODY1Mjc4NzQzLjE3NzAwMDM2NDU.*_ga_8JE65Q40S6*czE3NzAwMDM2NDQkbzEkZzEkdDE3NzAwMDM2ODgkajE2JGwwJGgw"
              alt="Lake"
            />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Details</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      fieldset {
        width: 650px;
        padding: 20px;
      }
      .row {
        margin: 10px 0;
      }
      label {
        display: inline-block;
        width: 120px;
      }
      input[type='text'],
      input[type='tel'] {
        width: 220px;
        padding: 4px;
      }
      .gender label {
        width: auto;
        margin-right: 15px;
      }
      button {
        padding: 5px 12px;
      }
    </style>
  </head>
  <body>
    <fieldset>
      <legend>Employee Details</legend>

      <form>
        <div class="row">
          <label>First name:</label>
          <input type="text" />
        </div>

        <div class="row">
          <label>Last name:</label>
          <input type="text" />
        </div>

        <div class="row gender">
          <label style="width: 120px">Gender:</label>
          <label><input type="radio" name="g" /> Male</label>
          <label><input type="radio" name="g" /> Female</label>
        </div>

        <div class="row">
          <label>Employee ID:</label>
          <input type="text" />
        </div>

        <div class="row">
          <label>Designation:</label>
          <input type="text" />
        </div>

        <div class="row">
          <label>Phone Number:</label>
          <input type="tel" />
        </div>

        <div class="row">
          <button type="submit">Submit</button>
        </div>
      </form>
    </fieldset>
  </body>
</html>
